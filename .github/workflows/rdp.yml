name: RDP Server

on:
  workflow_dispatch:

  jobs:
    rdp:
        runs-on: ubuntu-latest
            timeout-minutes: 360
                steps:
                      - name: Install Tailscale
                              run: |
                                        curl -fsSL https://tailscale.com/install.sh | sh
                                                  sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=github-rdp

                                                        - name: Install Desktop and XRDP
                                                                run: |
                                                                          sudo apt-get update -y
                                                                                    sudo DEBIAN_FRONTEND=noninteractive apt-get install -y xrdp xfce4 xfce4-goodies dbus-x11
                                                                                              sudo adduser xrdp ssl-cert
                                                                                                        echo xfce4-session > /home/runner/.xsession
                                                                                                                  sudo service xrdp restart
                                                                                                                  
                                                                                                                        - name: Set Password
                                                                                                                                run: echo "runner:RDP@1234" | sudo chpasswd
                                                                                                                                
                                                                                                                                      - name: Show Info
                                                                                                                                              run: |
                                                                                                                                                        echo "=== RDP READY ==="
                                                                                                                                                                  echo "User: runner"
                                                                                                                                                                            echo "Pass: RDP@1234"
                                                                                                                                                                                      echo "IP: $(tailscale ip -4)"
                                                                                                                                                                                                echo "================="
                                                                                                                                                                                                
                                                                                                                                                                                                      - name: Keep Alive 6 Hours
                                                                                                                                                                                                              run: sleep 21600
                                                                                                                                                                                                              
